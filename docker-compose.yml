services:

  # ─── PostgreSQL 18 + pgvector ────────────────────
  db:
    image: pgvector/pgvector:pg18
    container_name: sinodik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sinodik
      POSTGRES_USER: sinodik
      POSTGRES_PASSWORD: sinodik
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinodik"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────
  api:
    build: .
    container_name: sinodik-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SINODIK_DATABASE_URL: postgresql+asyncpg://sinodik:sinodik@db:5432/sinodik
      SINODIK_DATABASE_URL_SYNC: postgresql://sinodik:sinodik@db:5432/sinodik
      SINODIK_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost"]'
      SINODIK_ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app  # hot-reload in dev

  # ─── Nginx — serve PWA + reverse proxy API ──────
  nginx:
    image: nginx:alpine
    container_name: sinodik-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  pgdata:
