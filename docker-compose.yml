services:

  # ─── Traefik reverse proxy с SSL (ACME/Let's Encrypt) ─
  traefik:
    image: traefik:latest
    container_name: sinodik-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - sinodik_network
    labels:
      - "traefik.enable=true"

  # ─── PostgreSQL 18 + pgvector ────────────────────
  db:
    image: pgvector/pgvector:pg18
    container_name: sinodik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sinodik
      POSTGRES_USER: sinodik
      POSTGRES_PASSWORD: sinodik
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinodik"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sinodik_network

  # ─── Ollama (LLM + embeddings) ───────────────────
  # Ресурсы: qwen2.5:3b ~2–4 GB RAM/VRAM, qwen3-embedding:0.6b ~1 GB.
  # Рекомендация: минимум 4 GB RAM, с GPU — 4 GB+ VRAM. Лимиты ниже — по желанию.
  ollama:
    image: ollama/ollama
    container_name: sinodik-ollama
    restart: unless-stopped
    profiles:
    - ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - sinodik_network
    # deploy:
    #   resources:
    #     limits:
    #       memory: 6G
    #     reservations:
    #       memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "ollama list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  ollama-init:
    image: ollama/ollama
    container_name: sinodik-ollama-init
    profiles:
      - init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    dns:
      - 8.8.8.8
      - 8.8.4.4
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:3b && ollama pull qwen3-embedding:0.6b"]
    restart: "no"
    networks:
      - sinodik_network

  # ─── FastAPI Backend ─────────────────────────────
  api:
    build: .
    container_name: sinodik-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      # ollama:
      #   condition: service_healthy
    environment:
      PYTHONPATH: /app
      SINODIK_DATABASE_URL: postgresql+asyncpg://sinodik:sinodik@db:5432/sinodik
      SINODIK_DATABASE_URL_SYNC: postgresql://sinodik:sinodik@db:5432/sinodik
      SINODIK_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost","https://${SINODIK_HOST:-sinodik.spyridon.ru}"]'
      SINODIK_OPENAI_BASE_URL: http://ollama:11434/v1
      SINODIK_OPENAI_API_KEY: ollama
      SINODIK_OPENAI_MODEL: qwen2.5:3b
      SINODIK_EMBEDDING_URL: http://ollama:11434/v1
      SINODIK_EMBEDDING_API_KEY: ollama
      SINODIK_EMBEDDING_MODEL: qwen3-embedding:0.6b
      SINODIK_EMBEDDING_DIM: 384
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    networks:
      - sinodik_network

  # ─── Nginx — serve PWA + reverse proxy API ──────
  nginx:
    image: nginx:alpine
    container_name: sinodik-nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sinodik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sinodik.rule=Host(`${SINODIK_HOST:-sinodik.spyridon.ru}`)"
      - "traefik.http.routers.sinodik.entrypoints=websecure"
      - "traefik.http.routers.sinodik.tls.certresolver=letsencrypt"
      - "traefik.http.services.sinodik.loadbalancer.server.port=80"
      - "traefik.http.routers.sinodik.priority=10"

networks:
  sinodik_network:
    driver: bridge

volumes:
  pgdata:
  ollamadata:
